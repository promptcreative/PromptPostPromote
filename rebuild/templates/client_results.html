<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <title>Client Calendar - PromptPostPromote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #FFF8F0;
            min-height: 100vh;
            color: #2D2B3D;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 48px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo { font-size: 1.25rem; font-weight: 700; color: #2D2B3D; text-decoration: none; }

        .nav-links { display: flex; align-items: center; gap: 12px; }

        .nav-link {
            color: #6B6880;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .nav-link:hover { background: rgba(45,43,61,0.06); }

        .container { max-width: 960px; margin: 0 auto; padding: 0 32px 60px; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #8A8698;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 12px 0;
            transition: color 0.2s;
        }

        .back-link:hover { color: #2D2B3D; }
        .back-link svg { width: 16px; height: 16px; }

        .client-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 0 32px;
        }

        .client-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .client-info h1 { font-size: 1.5rem; font-weight: 700; }
        .client-info p { color: #8A8698; font-size: 0.88rem; margin-top: 2px; }

        .header-actions { margin-left: auto; display: flex; gap: 10px; }

        .btn-regen {
            background: white;
            border: 2px solid #EDE9E3;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            color: #2D2B3D;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-regen:hover { border-color: #2D2B3D; }
        .btn-regen svg { width: 16px; height: 16px; }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-state p { color: #8A8698; font-size: 0.95rem; }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #B0ADBC;
            margin-bottom: 16px;
            margin-top: 8px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            border: 2px solid transparent;
        }

        .stat-card.omni { border-color: #E8D5FF; background: linear-gradient(135deg, #FDFAFF, #F8F0FF); }
        .stat-card.double-go { border-color: #D4EDDA; background: linear-gradient(135deg, #FDFFF8, #F0FFF4); }
        .stat-card.good { border-color: #FFECD2; background: linear-gradient(135deg, #FFFDF8, #FFF8F0); }
        .stat-card.total { border-color: #D6EAF8; background: linear-gradient(135deg, #F8FDFF, #EBF5FB); }
        .stat-card.microbird { border-color: #FCE4EC; background: linear-gradient(135deg, #FFF8FA, #FFF0F3); }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-number.omni { color: #7C3AED; }
        .stat-number.double-go { color: #2E7D32; }
        .stat-number.good { color: #E65100; }
        .stat-number.total { color: #1976D2; }
        .stat-number.microbird { color: #C2185B; }

        .stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8A8698;
            margin-top: 6px;
        }

        .golden-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 36px;
        }

        .golden-card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .golden-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,43,61,0.08); }
        .golden-card.omni { border-color: #E8D5FF; background: linear-gradient(135deg, #FDFAFF, #F8F0FF); }
        .golden-card.double-go { border-color: #D4EDDA; background: linear-gradient(135deg, #FDFFF8, #F0FFF4); }
        .golden-card.good { border-color: #FFECD2; background: linear-gradient(135deg, #FFFDF8, #FFF8F0); }

        .golden-date {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .golden-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-omni { background: #E8D5FF; color: #7C3AED; }
        .badge-double-go { background: #D4EDDA; color: #2E7D32; }
        .badge-good { background: #FFECD2; color: #E65100; }

        .golden-details { font-size: 0.78rem; color: #8A8698; margin-top: 8px; line-height: 1.4; }

        .microbird-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 36px;
        }

        .microbird-card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            border: 2px solid #FCE4EC;
            background: linear-gradient(135deg, #FFF8FA, #FFF0F3);
            position: relative;
            transition: all 0.2s;
        }

        .microbird-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(194,24,91,0.1); }

        .microbird-date { font-size: 0.82rem; font-weight: 600; color: #2D2B3D; }

        .microbird-time {
            font-size: 1.15rem;
            font-weight: 700;
            color: #C2185B;
            margin: 6px 0;
        }

        .microbird-duration {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #FCE4EC;
            color: #C2185B;
            margin-left: 6px;
        }

        .microbird-detail { font-size: 0.78rem; color: #8A8698; line-height: 1.5; }

        .microbird-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

        .microbird-badge-transit {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-yp { background: #E8D5FF; color: #7C3AED; }
        .badge-pof { background: #FFF3E0; color: #E65100; }

        .bird-section { margin-bottom: 36px; }

        .bird-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .bird-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #4CAF50;
            box-shadow: 0 2px 8px rgba(45,43,61,0.04);
        }

        .bird-card .bird-date { font-size: 0.82rem; font-weight: 600; color: #2D2B3D; }
        .bird-card .bird-time { font-size: 0.95rem; font-weight: 700; color: #4CAF50; margin: 4px 0; }
        .bird-card .bird-detail { font-size: 0.78rem; color: #8A8698; }

        .transit-section { margin-bottom: 36px; }

        .transit-date-group { margin-bottom: 16px; }

        .transit-date-header {
            font-size: 0.82rem;
            font-weight: 700;
            color: #2D2B3D;
            padding: 8px 0 6px;
            border-bottom: 1px solid #F0EEE8;
            margin-bottom: 8px;
        }

        .transit-list { display: flex; flex-direction: column; gap: 6px; }

        .transit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(45,43,61,0.04);
        }

        .transit-time {
            font-size: 0.88rem;
            font-weight: 700;
            min-width: 110px;
            white-space: nowrap;
        }

        .transit-time.yp { color: #7C3AED; }
        .transit-time.pof { color: #E65100; }

        .transit-name { font-size: 0.82rem; color: #6B6880; }

        .transit-source-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: auto;
            flex-shrink: 0;
        }

        .transit-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 36px;
        }

        .transit-col-header {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 10px 14px;
            border-radius: 10px 10px 0 0;
            margin-bottom: 8px;
        }

        .transit-col-header.yp { background: #F3E8FF; color: #7C3AED; }
        .transit-col-header.pof { background: #FFF3E0; color: #E65100; }

        .calendar-table {
            width: 100%;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(45,43,61,0.05);
            margin-bottom: 36px;
        }

        .calendar-table table { width: 100%; border-collapse: collapse; }

        .calendar-table th {
            text-align: left;
            padding: 14px 18px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8A8698;
            background: #FDFBF9;
            border-bottom: 2px solid #F0EEE8;
        }

        .calendar-table td {
            padding: 12px 18px;
            font-size: 0.85rem;
            border-bottom: 1px solid #F5F3EF;
            vertical-align: middle;
        }

        .calendar-table tr:last-child td { border-bottom: none; }

        .day-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .day-omni { background: #E8D5FF; color: #7C3AED; }
        .day-double-go { background: #D4EDDA; color: #2E7D32; }
        .day-good { background: #E8F5E9; color: #4CAF50; }
        .day-neutral { background: #F5F3EF; color: #8A8698; }
        .day-slow { background: #FFF8E1; color: #F9A825; }
        .day-caution { background: #FFEBEE; color: #EF5350; }

        .no-data {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            color: #8A8698;
        }

        .btn-csv {
            background: linear-gradient(135deg, #7C3AED, #9C88FF);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-csv:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-csv svg { width: 16px; height: 16px; }

        .feeds-section { margin-bottom: 36px; }

        .feed-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(45,43,61,0.04);
        }

        .feed-label {
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 180px;
            color: #2D2B3D;
        }

        .feed-url {
            flex: 1;
            font-size: 0.78rem;
            color: #8A8698;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: monospace;
            background: #FDFBF9;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #F0EEE8;
        }

        .btn-copy {
            background: #F0EEE8;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 600;
            color: #2D2B3D;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .btn-copy:hover { background: #E0DDD8; }
        .btn-copy.copied { background: #D4EDDA; color: #2E7D32; }

        .section-divider {
            border: none;
            border-top: 1px solid #F0EEE8;
            margin: 8px 0 24px;
        }

        .empty-section {
            text-align: center;
            padding: 24px;
            background: white;
            border-radius: 12px;
            color: #B0ADBC;
            font-size: 0.85rem;
            margin-bottom: 36px;
        }

        @media (max-width: 768px) {
            nav { padding: 16px 20px; }
            .container { padding: 0 20px 40px; }
            .golden-grid { grid-template-columns: 1fr; }
            .bird-grid { grid-template-columns: 1fr; }
            .microbird-grid { grid-template-columns: 1fr; }
            .transit-columns { grid-template-columns: 1fr; }
            .client-header { flex-direction: column; align-items: flex-start; }
            .header-actions { margin-left: 0; flex-wrap: wrap; }
            .calendar-table { overflow-x: auto; }
            .feed-item { flex-wrap: wrap; }
            .feed-label { min-width: auto; }
            .feed-url { min-width: 0; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Prompt Post Promote</a>
        <div class="nav-links">
            <a href="/account-dashboard" class="nav-link">Dashboard</a>
            <a href="/clients" class="nav-link">Clients</a>
        </div>
    </nav>

    <div class="container">
        <a href="/clients" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            Back to clients
        </a>

        <div class="client-header" id="clientHeader">
            <div class="loading-state"><p>Loading...</p></div>
        </div>

        <div id="resultsContent"></div>
    </div>

    <script>
        const CLIENT_ID = {{ client_id }};
        const avatarColors = ['#9C88FF', '#4CAF50', '#FFB74D', '#EF5350', '#29B6F6', '#AB47BC', '#26A69A', '#FF7043'];

        function getAvatarColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return avatarColors[Math.abs(hash) % avatarColors.length];
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        function classKey(c) {
            if (!c) return 'neutral';
            const u = c.toUpperCase().replace(/[_ ]/g, '');
            if (u === 'OMNI') return 'omni';
            if (u === 'DOUBLEGO') return 'double-go';
            if (u === 'GOOD') return 'good';
            if (u === 'SLOW') return 'slow';
            if (u === 'CAUTION') return 'caution';
            return 'neutral';
        }

        function groupByDate(items, dateKey) {
            const groups = {};
            items.forEach(item => {
                const d = item[dateKey || 'date'];
                if (!groups[d]) groups[d] = [];
                groups[d].push(item);
            });
            return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
        }

        async function loadResults() {
            try {
                const resp = await fetch(`/api/clients/${CLIENT_ID}/calendar`);

                if (!resp.ok) {
                    const err = await resp.json();
                    document.getElementById('clientHeader').innerHTML = '';
                    document.getElementById('resultsContent').innerHTML = `
                        <div class="no-data">
                            <p>${err.message || 'No calendar data available'}</p>
                            <br>
                            <button class="btn-regen" onclick="regenerate()" style="margin: 16px auto; display: inline-flex;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                Generate Calendars
                            </button>
                            <br><br>
                            <a href="/clients" style="color: #9C88FF">Back to clients</a>
                        </div>`;
                    return;
                }

                const data = await resp.json();
                const client = data.client;
                const color = getAvatarColor(client.name || '');
                const initial = client.name ? client.name.charAt(0).toUpperCase() : '?';

                document.getElementById('clientHeader').innerHTML = `
                    <div class="client-avatar" style="background: ${color}">${initial}</div>
                    <div class="client-info">
                        <h1>${escapeHtml(client.name)}</h1>
                        <p>${client.birth_location_name ? escapeHtml(client.birth_location_name) : ''}${data.generated_at ? ' \u00B7 Generated ' + new Date(data.generated_at).toLocaleDateString() : ''}</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn-csv" onclick="downloadCSV()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Publer CSV
                        </button>
                        <button class="btn-regen" onclick="regenerate()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                            Regenerate
                        </button>
                    </div>`;

                let html = '';

                const omniCount = (data.golden_windows || []).filter(w => classKey(w.classification) === 'omni').length;
                const dgoCount = (data.golden_windows || []).filter(w => classKey(w.classification) === 'double-go').length;
                const goodCount = (data.good_days || []).length;
                const totalBg = (data.background_days || []).length;
                const mbCount = (data.micro_bird_events || []).length;

                html += '<div class="section-title">Pipeline Summary</div>';
                html += '<div class="stats-row">';
                html += `<div class="stat-card omni"><div class="stat-number omni">${omniCount}</div><div class="stat-label">OMNI</div></div>`;
                html += `<div class="stat-card double-go"><div class="stat-number double-go">${dgoCount}</div><div class="stat-label">Double GO</div></div>`;
                html += `<div class="stat-card good"><div class="stat-number good">${goodCount}</div><div class="stat-label">Good</div></div>`;
                html += `<div class="stat-card total"><div class="stat-number total">${totalBg}</div><div class="stat-label">Background Days</div></div>`;
                html += `<div class="stat-card microbird"><div class="stat-number microbird">${mbCount}</div><div class="stat-label">Micro Bird</div></div>`;
                html += '</div>';

                if (data.golden_windows && data.golden_windows.length > 0) {
                    html += `<div class="section-title">Golden Windows (${data.golden_windows.length})</div>`;
                    html += '<div class="golden-grid">';
                    data.golden_windows.forEach(w => {
                        const cls = classKey(w.classification);
                        const badgeCls = cls === 'omni' ? 'badge-omni' : cls === 'double-go' ? 'badge-double-go' : 'badge-good';
                        html += `
                            <div class="golden-card ${cls}">
                                <div class="golden-date">${formatDate(w.date)}</div>
                                <span class="golden-badge ${badgeCls}">${escapeHtml(w.classification)}</span>
                                <div class="golden-details">
                                    ${w.pti_label ? 'PTI: ' + escapeHtml(w.pti_label) : ''}
                                    ${w.vedic_label ? '<br>Vedic: ' + escapeHtml(w.vedic_label) : ''}
                                    ${w.personal_label ? '<br>Personal: ' + escapeHtml(w.personal_label) : ''}
                                </div>
                            </div>`;
                    });
                    html += '</div>';
                }

                html += '<hr class="section-divider">';
                html += '<div id="microbird-section"><div class="section-title">Micro Bird \u2014 Precision Posting</div><div class="empty-section" style="color:#C2185B">Calculating microtransits... this may take a minute</div></div>';

                if (data.bird_periods && data.bird_periods.length > 0) {
                    html += '<hr class="section-divider">';
                    html += `<div class="section-title">Bird Batch on Background (${data.bird_periods.length} windows)</div>`;
                    html += '<div class="bird-grid">';
                    data.bird_periods.forEach(p => {
                        html += `
                            <div class="bird-card">
                                <div class="bird-date">${formatDate(p.date)}</div>
                                <div class="bird-time">${p.start || ''} \u2013 ${p.end || ''}</div>
                                <div class="bird-detail">${p.tier ? escapeHtml(p.tier) : ''}${p.bird ? ' \u00B7 ' + escapeHtml(p.bird) : ''}${p.activity ? ' \u00B7 ' + escapeHtml(p.activity) : ''}</div>
                            </div>`;
                    });
                    html += '</div>';
                }

                html += '<div id="microtransit-section"><div class="section-title">Microtransit Layers</div><div class="empty-section">Loading Yogi Point and Part of Fortune transits...</div></div>';

                if (data.combined_results && data.combined_results.length > 0) {
                    html += '<hr class="section-divider">';
                    html += '<div class="section-title">Full Calendar</div>';
                    html += '<div class="calendar-table"><table>';
                    html += '<tr><th>Date</th><th>Day</th><th>Classification</th><th>Details</th></tr>';
                    data.combined_results.forEach(day => {
                        const cls = classKey(day.classification);
                        html += `
                            <tr>
                                <td>${formatDate(day.date)}</td>
                                <td style="font-weight:500">${day.date || ''}</td>
                                <td><span class="day-badge day-${cls}">${escapeHtml(day.classification || 'NEUTRAL')}</span></td>
                                <td style="color:#8A8698;font-size:0.82rem">${day.description ? escapeHtml(day.description) : ''}</td>
                            </tr>`;
                    });
                    html += '</table></div>';
                }

                if (!html) {
                    html = '<div class="no-data"><p>No calendar results available. Try regenerating.</p></div>';
                }

                document.getElementById('resultsContent').innerHTML = html;
                loadICSFeeds();
                loadMicrotransits();

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('resultsContent').innerHTML = '<div class="no-data"><p>Error loading results</p></div>';
            }
        }

        async function loadMicrotransits() {
            try {
                const resp = await fetch(`/api/clients/${CLIENT_ID}/microtransits`);
                if (!resp.ok) {
                    document.getElementById('microbird-section').innerHTML = '<div class="section-title">Micro Bird \u2014 Precision Posting</div><div class="empty-section">Could not load microtransit data</div>';
                    document.getElementById('microtransit-section').innerHTML = '';
                    return;
                }
                const mt = await resp.json();

                let mbHtml = '';
                const mbEvents = mt.micro_bird_events || [];
                if (mbEvents.length > 0) {
                    mbHtml += `<div class="section-title">Micro Bird \u2014 Precision Posting (${mbEvents.length} windows)</div>`;
                    mbHtml += '<div class="microbird-grid">';
                    mbEvents.forEach(mb => {
                        const srcBadge = mb.transit_type === 'YP' ? 'badge-yp' : 'badge-pof';
                        const srcLabel = mb.transit_type === 'YP' ? 'Yogi Point' : 'Part of Fortune';
                        mbHtml += `
                            <div class="microbird-card">
                                <div class="microbird-date">${formatDate(mb.date)}</div>
                                <div class="microbird-time">
                                    ${escapeHtml(mb.start)} \u2013 ${escapeHtml(mb.end)}
                                    <span class="microbird-duration">${mb.duration}min</span>
                                </div>
                                <div class="microbird-detail">
                                    ${mb.transit_name ? escapeHtml(mb.transit_name) : ''}
                                    ${mb.bird ? '<br>' + escapeHtml(mb.bird_tier) + ' \u00B7 ' + escapeHtml(mb.bird) + ' \u00B7 ' + escapeHtml(mb.activity) : ''}
                                </div>
                                <div class="microbird-badges">
                                    <span class="microbird-badge-transit ${srcBadge}">${srcLabel}</span>
                                    ${mb.bird_tier ? '<span class="microbird-badge-transit" style="background:#E8F5E9;color:#2E7D32">' + escapeHtml(mb.bird_tier) + '</span>' : ''}
                                </div>
                            </div>`;
                    });
                    mbHtml += '</div>';
                } else {
                    mbHtml += '<div class="section-title">Micro Bird \u2014 Precision Posting</div>';
                    mbHtml += '<div class="empty-section">No Micro Bird windows found. Micro Bird events appear when microtransit windows overlap with Bird Batch periods on background days.</div>';
                }
                document.getElementById('microbird-section').innerHTML = mbHtml;

                const mbCountEl = document.querySelector('.stat-card.microbird .stat-number');
                if (mbCountEl) mbCountEl.textContent = mbEvents.length;

                const ypTransits = mt.yp_transits || [];
                const pofTransits = mt.pof_transits || [];
                let mtHtml = '';

                if (ypTransits.length > 0 || pofTransits.length > 0) {
                    mtHtml += `<hr class="section-divider">`;
                    mtHtml += `<div class="section-title">Microtransit Layers (${ypTransits.length + pofTransits.length} transits on background days)</div>`;
                    mtHtml += '<div class="transit-columns">';

                    mtHtml += '<div>';
                    mtHtml += `<div class="transit-col-header yp">Yogi Point (${ypTransits.length})</div>`;
                    if (ypTransits.length > 0) {
                        const ypGroups = groupByDate(ypTransits);
                        ypGroups.forEach(([dt, items]) => {
                            mtHtml += `<div class="transit-date-group">`;
                            mtHtml += `<div class="transit-date-header">${formatDate(dt)}</div>`;
                            mtHtml += `<div class="transit-list">`;
                            items.forEach(t => {
                                mtHtml += `
                                    <div class="transit-item">
                                        <span class="transit-time yp">${escapeHtml(t.start)} \u2013 ${escapeHtml(t.end)}</span>
                                        <span class="transit-name">${escapeHtml(t.type)}</span>
                                    </div>`;
                            });
                            mtHtml += '</div></div>';
                        });
                    } else {
                        mtHtml += '<div class="empty-section" style="margin-top:0">No Yogi Point transits on background days</div>';
                    }
                    mtHtml += '</div>';

                    mtHtml += '<div>';
                    mtHtml += `<div class="transit-col-header pof">Part of Fortune (${pofTransits.length})</div>`;
                    if (pofTransits.length > 0) {
                        const pofGroups = groupByDate(pofTransits);
                        pofGroups.forEach(([dt, items]) => {
                            mtHtml += `<div class="transit-date-group">`;
                            mtHtml += `<div class="transit-date-header">${formatDate(dt)}</div>`;
                            mtHtml += `<div class="transit-list">`;
                            items.forEach(t => {
                                mtHtml += `
                                    <div class="transit-item">
                                        <span class="transit-time pof">${escapeHtml(t.start)} \u2013 ${escapeHtml(t.end)}</span>
                                        <span class="transit-name">${escapeHtml(t.type)}</span>
                                    </div>`;
                            });
                            mtHtml += '</div></div>';
                        });
                    } else {
                        mtHtml += '<div class="empty-section" style="margin-top:0">No Part of Fortune transits on background days</div>';
                    }
                    mtHtml += '</div>';
                    mtHtml += '</div>';
                } else {
                    mtHtml += '<hr class="section-divider">';
                    mtHtml += '<div class="section-title">Microtransit Layers</div>';
                    mtHtml += '<div class="empty-section">No microtransits found on background days</div>';
                }
                document.getElementById('microtransit-section').innerHTML = mtHtml;

            } catch (err) {
                console.error('Microtransit load error:', err);
                document.getElementById('microbird-section').innerHTML = '<div class="section-title">Micro Bird \u2014 Precision Posting</div><div class="empty-section">Error loading microtransit data</div>';
                document.getElementById('microtransit-section').innerHTML = '';
            }
        }

        async function regenerate() {
            const btn = document.querySelector('.btn-regen');
            if (btn) { btn.innerHTML = 'Generating...'; btn.disabled = true; }

            try {
                const resp = await fetch(`/api/clients/${CLIENT_ID}/generate`, { method: 'POST' });
                const data = await resp.json();

                if (data.status === 'success') {
                    loadResults();
                } else {
                    alert(data.message || 'Generation failed');
                    if (btn) { btn.innerHTML = 'Regenerate'; btn.disabled = false; }
                }
            } catch (e) {
                alert('Error generating calendar');
                if (btn) { btn.innerHTML = 'Regenerate'; btn.disabled = false; }
            }
        }

        function downloadCSV() {
            window.location.href = `/api/clients/${CLIENT_ID}/publer-csv`;
        }

        async function loadICSFeeds() {
            try {
                const resp = await fetch(`/api/clients/${CLIENT_ID}/ics-feeds`);
                if (!resp.ok) return;
                const data = await resp.json();
                if (data.status !== 'success' || !data.feeds) return;

                const baseUrl = window.location.origin;
                let feedsHtml = '<hr class="section-divider"><div class="section-title">Calendar Feeds (ICS)</div><div class="feeds-section">';

                Object.entries(data.feeds).forEach(([key, feed]) => {
                    const fullUrl = baseUrl + feed.url;
                    feedsHtml += `
                        <div class="feed-item">
                            <span class="feed-label">${escapeHtml(feed.label)}</span>
                            <span class="feed-url" title="${escapeHtml(fullUrl)}">${escapeHtml(fullUrl)}</span>
                            <button class="btn-copy" data-url="${escapeHtml(fullUrl)}" onclick="copyFeedUrl(this, this.dataset.url)">Copy</button>
                        </div>`;
                });
                feedsHtml += '</div>';

                const content = document.getElementById('resultsContent');
                const calTable = content.querySelector('.calendar-table');
                if (calTable) {
                    calTable.insertAdjacentHTML('beforebegin', feedsHtml);
                } else {
                    content.innerHTML += feedsHtml;
                }
            } catch (err) {
                console.error('Error loading feeds:', err);
            }
        }

        function copyFeedUrl(btn, url) {
            navigator.clipboard.writeText(url).then(() => {
                btn.textContent = 'Copied';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = url;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = 'Copied';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
            });
        }

        document.addEventListener('DOMContentLoaded', loadResults);
    </script>
</body>
</html>
